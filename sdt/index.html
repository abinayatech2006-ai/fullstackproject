<!DOCTYPE html>
<html>
<head>
    <title>Food Expiry Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Food Expiry Management System</h1>

<div class="container">
    <input type="text" id="foodName" placeholder="Food Name">
    <input type="date" id="expiryDate">
    <button onclick="addFood()">Add Food</button>

    <h2>Food List</h2>
    <table id="foodTable">
        <thead>
            <tr>
                <th>Food Name</th>
                <th>Expiry Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will appear here -->
        </tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
